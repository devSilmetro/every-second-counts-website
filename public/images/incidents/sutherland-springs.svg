<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162335"/>
      <stop offset="100%" stop-color="#0E1A2B"/>
    </linearGradient>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="url(#bg)"/>
      <circle cx="1" cy="1" r="0.4" fill="rgba(246,241,230,0.025)"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#grain)"/>
  <rect x="80" y="80" width="1440" height="840" fill="none" stroke="rgba(246,241,230,0.08)" stroke-width="1" stroke-dasharray="2 6"/>
  <rect x="700" y="420" width="200" height="2" fill="#E5B770"/>
  <text x="800" y="395" text-anchor="middle" font-family="ui-monospace,Menlo,Monaco,monospace" font-size="13" fill="#E5B770" letter-spacing="6">PHOTOGRAPH</text>
  <text x="800" y="490" text-anchor="middle" font-family="'Source Serif 4',Georgia,serif" font-size="42" font-style="italic" font-weight="450" fill="rgba(246,241,230,0.92)" letter-spacing="-0.5">Image not yet available</text>
  <text x="800" y="560" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" fill="rgba(246,241,230,0.55)" letter-spacing="0.3">
    <tspan x="800" dy="0">No free-licensed photograph of this site exists in</tspan>
    <tspan x="800" dy="22">Wikimedia Commons. We do not publish copyrighted</tspan>
    <tspan x="800" dy="22">news photos without a license.</tspan>
  </text>
</svg>
